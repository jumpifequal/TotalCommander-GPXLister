[GPXLister]
; ===== Core viewer settings =====

; Enable or disable map tile background visualisation. 
; 1 = Tiles ON, 0 = Show only track and grid. Toggle at runtime using the 'M' key.
useTiles=1

; Draw a cartographic grid when tiles are disabled or when no tiles are rendered in the current frame.
showGridWhenNoTiles=1

; Display a dynamic scale bar in the bottom-centre of the viewer.
showScale=1

; Display the active track name and current cursor coordinates (latitude/longitude) in the top-left.
showCoords=1

; Default zoom level upon opening a file. Valid range: 3 (world) to 19 (street level).
; Note: 'Fit to Window' (X key) will override this setting to optimise the view.
initialZoom=13

; Initial visibility of the elevation profile panel at the bottom of the window.
; 1 = Shown by default, 0 = Hidden. Toggle at runtime using the 'E' key.
showElevationProfile=1

; Initial visibility of the slope colouring of the track.
; 1 = Shown by default, 0 = Hidden. Toggle at runtime using the 'S' key.
showSlopeColouringOnTrack=1

; Initial thickness of the track draw line. It's a float value. 
; This affects only the map track stroke, not the elevation profile
; Range is clamped to 0.5 through 12.0. If missing or invalid GPXLister reverts to default (2.0)
trackLineWidth=5

; ===== Tiles / Networking =====

; Standard Slippy Map server URL. Uses {z}, {x}, {y} placeholders.
; Default is OpenStreetMap: https://tile.openstreetmap.org/{z}/{x}/{y}.png
tileEndpoint=https://tile.openstreetmap.org/{z}/{x}/{y}.png

; Alternative server URL activated by the 'T' key (Satellite Mode).
; Default is Google Satellite: https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}
satelliteTileEndpoint=https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}

; The HTTP User-Agent string sent to tile servers. Some providers require this to allow requests.
userAgent=GPXLister

; Number of concurrent background threads used for downloading map tiles.
; Valid range: 1 to 8. Higher values speed up loading but increase network load.
workers=6

; Base throttling delay in milliseconds between requests per worker thread.
requestDelayMs=55

; Initial wait time in milliseconds for the exponential backoff algorithm after a network error.
backoffStartMs=500

; Maximum wait time in milliseconds for the exponential backoff algorithm.
backoffMaxMs=4000

; Number of additional tile 'rings' to pre-load outside the visible viewport.
; Valid range: 0 to 4. Higher values make panning smoother at the cost of bandwidth.
prefetchRings=3

; Capacity of the LRU (Least Recently Used) cache for decoded Direct2D bitmaps.
; Higher values (e.g., 1024) are recommended for high-DPI displays or large monitors.
maxBitmaps=512


; ===== FIT integration (external converter) =====

; Executable name or full path for converting Garmin .FIT files. 
; The programme searches the plugin folder first, then the system PATH.
fitConverter=Fit2Gpx.exe

; Additional command-line arguments passed to the FIT converter.
; Examples: --do-not-fetch-elevation or --elevation-dataset srtm30m
fitArgs=

; conversion timeout (seconds). On timeout, converter is terminated and an error is shown.
fitTimeoutSec=60
